<script>
// جلب IP وعرض المعلومات
fetch("https://ipinfo.io/json")
.then(response => response.json())
.then(data => {
    document.getElementById("ip").textContent = data.ip;
    document.getElementById("info").innerHTML =
        "City: " + data.city + "<br>" +
        "Region: " + data.region + "<br>" +
        "Country: " + data.country + "<br>" +
        "Location: " + data.loc + "<br>" +
        "Org: " + data.org + "<br>" +
        "Timezone: " + data.timezone;
})
.catch(() => {
    document.getElementById("ip").textContent = "Unavailable";
    document.getElementById("info").innerHTML = "IP info not available.";
});

// تشغيل الصوت تلقائياً
window.addEventListener("load", function() {
    const audio = document.getElementById("bg-audio");
    audio.volume = 0.7; // مستوى الصوت
    audio.play().catch(() => {
        // إذا منع المتصفح التشغيل التلقائي
        document.body.addEventListener("click", () => {
            audio.play();
        }, { once: true });
    });
});
</script>
